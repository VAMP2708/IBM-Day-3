<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            height: 100vh;
            background:linear-gradient(to right,pink,orange)
        }
        nav{
            height: 50px;
            background-color: black;
        }
        h1{
            margin: 0;
            text-align: center;
            color: rgba(255, 200, 0, 0.873);
            font-size: 40px;
        }
        .keyboard{
            width:90%;
            margin:auto;
            display: flex;
            justify-content: center;
        }
        .keys{
            border: 1px solid none;
            width: 70px;
            height:70px ;
            margin: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color:  #F5D9CA;
            box-shadow: rgba(0, 0, 0, 0.25) 0px 54px 55px, rgba(0, 0, 0, 0.12) 0px -12px 30px, rgba(0, 0, 0, 0.12) 0px 4px 6px, rgba(0, 0, 0, 0.17) 0px 12px 13px, rgba(0, 0, 0, 0.09) 0px -3px 5px;
        }
        #special{
            border-radius: 10px;
            width: 90px;
        }
        .lower{
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <nav></nav>
    <h1>KEYBOARD</h1>
    <div class="keyboard">
        <div class="keys">Esc</div>
        <div class="keys">F1</div>
        <div class="keys">F2</div>
        <div class="keys">F3</div>
        <div class="keys">F4</div>
        <div class="keys">F5</div>
        <div class="keys">F6</div>
        <div class="keys">F7</div>
        <div class="keys">F8</div>
        <div class="keys">F9</div>
        <div class="keys">F10</div>
        <div class="keys">F11</div>
        <div class="keys">F12</div>
        <div class="keys">Insert</div>
        <div class="keys" id="special">PrintSc</div>
        <div class="keys">Delete</div>
    </div>
    <div class="keyboard">
        <div class="keys">~</div>
        <div class="keys">1</div>
        <div class="keys">2</div>
        <div class="keys">3</div>
        <div class="keys">4</div>
        <div class="keys">5</div>
        <div class="keys">6</div>
        <div class="keys">7</div>
        <div class="keys">8</div>
        <div class="keys">9</div>
        <div class="keys">10</div>
        <div class="keys">-</div>
        <div class="keys">=</div>
        <div class="keys" id="special" style="width: 170px;">Backspace</div>
        <div class="keys">Home</div>
    </div>
    <div class="keyboard">
        <div class="keys">Tab</div>
        <div class="keys">Q</div>
        <div class="keys">W</div>
        <div class="keys">E</div>
        <div class="keys">R</div>
        <div class="keys">T</div>
        <div class="keys">Y</div>
        <div class="keys">U</div>
        <div class="keys">I</div>
        <div class="keys">O</div>
        <div class="keys">P</div>
        <div class="keys">{</div>
        <div class="keys">}</div>
        <div class="keys">\</div>
        <div class="keys">Pg Up</div>
    </div>
    <div class="keyboard">
        <div class="keys" id="special">Caps Lock</div>
        <div class="keys">A</div>
        <div class="keys">S</div>
        <div class="keys">D</div>
        <div class="keys">F</div>
        <div class="keys">G</div>

        <div class="keys">J</div>
        <div class="keys">K</div>
        <div class="keys">L</div>
        <div class="keys">;</div>
        <div class="keys">"</div>
        <div class="keys" id="special">Enter</div>
        <div class="keys">Pg Dn</div>
    </div>
    <div class="keyboard">
        <div class="keys">Shift</div>
        <div class="keys">Z</div>
        <div class="keys">X</div>
        <div class="keys">C</div>
        <div class="keys">V</div>

        <div class="keys">Shift</div>
        <div class="keys">↑</div>
        <div class="keys">End</div>
    </div>
    <div class="keyboard" >
        <div class="keys" id="special">Ctrl</div>
        <div class="keys" id="special">Fn</div>
        <div class="keys" id="special">Win</div>
        <div class="keys" id="special">Alt</div>
        <div class="keys" id="special" style="width: 300px;">Space</div>

        <div class="keys" id="special">→</div>

    </div>

</html>
