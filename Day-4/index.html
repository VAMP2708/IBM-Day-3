<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
            #container{
                border: 1px solid gray;
                width: 50%;
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                align-items: center;
                margin:auto;
                border-radius: 5px;
                margin-top: 50px ;
                box-shadow: blue 0px 0px 0px 2px inset, rgb(255, 255, 255) 10px -10px 0px -3px, rgb(31, 193, 27) 10px -10px, rgb(255, 255, 255) 20px -20px 0px -3px, rgb(255, 217, 19) 20px -20px, rgb(255, 255, 255) 30px -30px 0px -3px, rgb(255, 156, 85) 30px -30px, rgb(255, 255, 255) 40px -40px 0px -3px, rgb(255, 85, 85) 40px -40px;
            }

        .child{
            border: 1px solid none;
            border-radius: 10px;
            width: 150px;
            height:150px ;
            margin: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(238, 240, 234);
            box-shadow: rgba(201, 9, 9, 0.825) 0px -23px 25px 0px inset, rgba(243, 105, 105, 0.797) 0px -36px 30px 0px inset, rgba(0, 0, 0, 0.1) 0px -79px 40px 0px inset, rgba(0, 0, 0, 0.06) 0px 2px 1px, rgba(0, 0, 0, 0.09) 0px 4px 2px, rgba(0, 0, 0, 0.09) 0px 8px 4px, rgba(0, 0, 0, 0.09) 0px 16px 8px, rgba(0, 0, 0, 0.09) 0px 32px 16px;        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">Flex Box</h1>
    <div id="container">
       <div class="child">Box</div>
       <div class="child">Box</div>
       <div class="child">Box</div>
       <div class="child">Box</div>
       <div class="child">Box</div>
       <div class="child">Box</div>
       <div class="child">Box</div>
       <div class="child">Box</div>
       <div class="child">Box</div>
       <div class="child">Box</div>
    </div>
</body>
</html>
